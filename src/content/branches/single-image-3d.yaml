title: "Single-Image 3D"
tagline: "Reconstructing 3D from a single image — the original ill-posed problem of machine vision"
description: >
  A single 2D image is compatible with infinitely many 3D scenes — the problem has
  no unique solution, so the entire history of this branch is a history of PRIORS:
  from physical priors (shape-from-shading), through statistical priors learned
  from data (Make3D, Eigen), geometric priors baked into representations
  (voxels → points → meshes → implicit functions), to internet-scale priors
  borrowed from image generators (Zero-1-to-3, LRM). Each generation swaps the
  kind of prior and pays a different price.
i18n:
  vi:
    title: "3D từ một ảnh"
    tagline: "Dựng 3D từ một tấm ảnh duy nhất — bài toán ill-posed nguyên thủy của thị giác máy"
    description: >
      Một tấm ảnh 2D có thể ứng với vô số cảnh 3D khác nhau — bài toán không có
      nghiệm duy nhất, nên trọn lịch sử của nhánh này là lịch sử của PRIOR: từ
      prior vật lý (shape-from-shading), sang prior thống kê học từ dữ liệu
      (Make3D, Eigen), prior hình học cài sẵn trong cách biểu diễn (voxel →
      point cloud → mesh → hàm ẩn), cho đến prior cỡ internet mượn từ các mô
      hình sinh ảnh (Zero-1-to-3, LRM). Thế hệ nào cũng thay một loại prior
      mới — và trả một cái giá kiểu mới.
  ja:
    title: "単一画像3D"
    tagline: "一枚の画像からの3D復元 — マシンビジョン最古の不良設定問題"
    description: "一枚の2D画像に合致する3Dシーンは無数にあります。解が一つに定まらない — だからこの枝の歴史は、まるごと「事前知識 (prior) の歴史」です。物理の prior (shape-from-shading) から、データに学ぶ統計の prior (Make3D、Eigen)、表現そのものに焼き込まれた幾何の prior (ボクセル → 点群 → メッシュ → 陰関数)、そして画像生成モデルから借りてきたインターネット規模の prior (Zero-1-to-3、LRM) へ。世代が替わるたびに prior の種類が替わり、支払う代償も替わってきました。"
color: "#3987e5" # categorical slot 1 (dark)
order: 1
status: active
