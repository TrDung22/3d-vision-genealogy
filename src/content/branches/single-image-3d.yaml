title: "Single-Image 3D"
tagline: "Reconstructing 3D from a single image — the original ill-posed problem of machine vision"
description: >
  A single 2D image is compatible with infinitely many 3D scenes — the problem has
  no unique solution, so the entire history of this branch is a history of PRIORS:
  from physical priors (shape-from-shading), through statistical priors learned
  from data (Make3D, Eigen), geometric priors baked into representations
  (voxels → points → meshes → implicit functions), to internet-scale priors
  borrowed from image generators (Zero-1-to-3, LRM). Each generation swaps the
  kind of prior and pays a different price.
i18n:
  vi:
    tagline: "Dựng 3D từ một ảnh duy nhất — bài toán ill-posed nguyên thủy của thị giác máy"
    description: >
      Một ảnh 2D tương thích với vô số cảnh 3D — bài toán không có nghiệm duy nhất,
      nên toàn bộ lịch sử của nhánh này là lịch sử của các loại PRIOR: từ prior vật lý
      (shape-from-shading), qua prior thống kê học từ dữ liệu (Make3D, Eigen), prior
      hình học gắn trong biểu diễn (voxel → point → mesh → hàm ẩn), đến prior
      internet-scale mượn từ các mô hình sinh ảnh (Zero-1-to-3, LRM). Mỗi thế hệ đổi
      một loại prior và trả một cái giá khác nhau.
  ja:
    tagline: "一枚の画像からの3D復元 — マシンビジョン最古の不良設定問題"
    description: >
      一枚の2D画像は無数の3Dシーンと矛盾しません — 解が一意に定まらない問題です。
      だからこの枝の歴史は、まるごと「事前知識 (prior) の歴史」になります: 物理的 prior
      (shape-from-shading) から、データから学ぶ統計的 prior (Make3D、Eigen)、表現に
      埋め込まれた幾何学的 prior (ボクセル → 点群 → メッシュ → 陰関数)、そして画像生成
      モデルから借りたインターネット規模の prior (Zero-1-to-3、LRM) へ。世代ごとに
      prior の種類を替え、それぞれ異なる代償を払ってきました。
