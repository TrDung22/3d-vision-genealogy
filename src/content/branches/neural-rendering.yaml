title: "Neural Rendering"
tagline: "Scene representations as neural networks + differentiable rendering — the infrastructure of a whole generation"
description: >
  This branch is the story of one equation learning to run backwards: the
  1984 volume rendering integral, revived as a differentiable renderer, turned
  the scene itself into a trainable parameter. Its history is a series of
  pendulum swings — geometry-free light fields (1996) vs geometry proxies;
  neural representations (SRN, NeRF) vs the no-network heresy (Plenoxels);
  ray marching vs the resurrected 2001 splatting math (3DGS); and now explicit
  3D structure vs pure transformers that render with no 3D machinery at all
  (LVSM). Each swing trades the same three currencies: quality, speed, and how
  much human geometry you must smuggle into the model.
i18n:
  vi:
    tagline: "Biểu diễn cảnh bằng mạng nơ-ron + render khả vi — hạ tầng của cả một thế hệ"
    description: >
      Nhánh này là chuyện một phương trình học được cách chạy ngược: tích phân
      volume rendering năm 1984 sống dậy dưới dạng renderer khả vi, biến chính
      cảnh 3D thành thứ huấn luyện được. Lịch sử của nó là một con lắc văng qua
      văng lại: light field không cần hình học (1996) đấu với proxy hình học;
      biểu diễn nơ-ron (SRN, NeRF) đấu với phe "dị giáo" bỏ hẳn mạng nơ-ron
      (Plenoxels); ray marching đấu với phép splatting năm 2001 được đào lại
      (3DGS); và bây giờ là cấu trúc 3D tường minh đấu với transformer thuần
      render mà chẳng cần chút máy móc 3D nào (LVSM). Lần nào con lắc văng,
      cuộc mặc cả cũng xoay quanh đúng ba thứ: chất lượng, tốc độ, và lượng
      hình học con người phải lén tuồn vào mô hình.
  ja:
    title: "ニューラルレンダリング"
    tagline: "ニューラルネットによるシーン表現 + 微分可能レンダリング — 一世代まるごとのインフラ"
    description: "この枝は、ひとつの方程式が逆向きに走ることを覚えた物語です。1984年のボリュームレンダリング積分が微分可能レンダラーとして蘇り、シーンそのものが学習できるパラメータになりました。その歴史は振り子の往復です。幾何いらずのライトフィールド (1996) 対 幾何プロキシ。ニューラル表現 (SRN、NeRF) 対「ネットワーク不要」という異端 (Plenoxels)。レイマーチング 対 掘り起こされた2001年のスプラッティング (3DGS)。そして今は、明示的な3D構造 対 3Dの仕掛けを一切持たない純粋トランスフォーマー (LVSM)。振り子がどちらへ振れても、天秤に載るのはいつも同じ三つ — 品質、速度、そして人間の幾何知識をどれだけモデルに忍び込ませるか。"
