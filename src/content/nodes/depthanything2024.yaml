title: "Depth Anything: Unleashing the Power of Large-Scale Unlabeled Data"
short: "Depth Anything (2024)"
authors: "Lihe Yang, Bingyi Kang, Zilong Huang, Xiaogang Xu, Jiashi Feng, Hengshuang Zhao"
venue: "CVPR 2024"
year: 2024
branch: single-image-3d
lane: depth
links:
  arxiv: "https://arxiv.org/abs/2401.10891"
  code: "https://github.com/LiheYoung/Depth-Anything"
problem: >
  The labeled-data ceiling of the MiDaS/DPT line: build a "foundation model"
  for depth when real labels will always be scarce.
solution: >
  Break the ceiling with 62 million UNLABELED images: a teacher pseudo-labels,
  a student relearns under strong augmentations + a semantic feature
  constraint — the semi-supervised recipe at foundation-model scale.
limitations: >
  Still relative depth at its core (the metric variant needs fine-tuning); fine
  detail (hair, mesh, thin edges) remains weak — exactly where the
  generative-prior line is stronger, and why the two philosophies keep running
  in parallel.
relations:
  - node: dpt2021
    type: builds-on
    note: >
      Keeps the DPT-line architecture and scales the remaining axis: data —
      from millions of labeled images to tens of millions of unlabeled ones.
    i18n:
      vi:
        note: >
          Giữ kiến trúc mạch DPT và nhân rộng trục còn lại: dữ liệu — từ hàng
          triệu ảnh có nhãn lên hàng chục triệu ảnh không nhãn.
      ja:
        note: "DPT 路線のアーキテクチャを保ったまま、残る軸 — データ — をスケールさせます。数百万枚のラベル付きから、数千万枚のラベルなしへ。"
  - node: marigold2023
    type: independent
    note: >
      Released almost simultaneously — two independent answers to the same
      question: scale real data (Depth Anything) vs borrow a generative prior
      (Marigold).
    i18n:
      vi:
        note: >
          Ra mắt gần như cùng lúc — hai câu trả lời độc lập cho cùng một câu
          hỏi: nhân rộng dữ liệu thật (Depth Anything) hay mượn prior tạo sinh
          (Marigold).
      ja:
        note: "ほぼ同時に公開された、同じ問いへの二つの独立した答えです。実データをスケールさせるか (Depth Anything)、生成の事前知識を借りるか (Marigold)。"
status: seed
i18n:
  vi:
    problem: >
      Cái trần dữ-liệu-gán-nhãn của mạch MiDaS/DPT: xây một "foundation model"
      cho độ sâu trong khi nhãn thật sẽ mãi mãi khan hiếm.
    solution: >
      Phá trần bằng 62 triệu ảnh KHÔNG NHÃN: teacher gán nhãn giả, student học
      lại dưới augmentation mạnh + ràng buộc đặc trưng ngữ nghĩa — công thức
      bán giám sát ở quy mô foundation model.
    limitations: >
      Cốt lõi vẫn là độ sâu tương đối (bản metric phải fine-tune); chi tiết
      mịn (tóc, lưới, cạnh mỏng) vẫn yếu — đúng chỗ mạch prior tạo sinh mạnh
      hơn, và là lý do hai triết lý tiếp tục chạy song song.
  ja:
    problem: "MiDaS/DPT 路線に立ちはだかるラベル付きデータの天井 — 本物のラベルが永遠に足りない中で、深度の「基盤モデル」をどう作るか。"
    solution: "6,200万枚のラベルなし画像で天井を破ります。teacher が擬似ラベルを付け、student は強い augmentation と意味特徴の制約の下で学び直す — 基盤モデル規模で回す半教師あり学習のレシピです。"
    limitations: "核はやはり相対深度 (metric 版は微調整が必要)。髪や網、細いエッジといった微細なディテールは弱いまま — まさに生成 prior 路線が得意な場所であり、二つの哲学が並走し続ける理由です。"
