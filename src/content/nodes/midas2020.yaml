title: "Towards Robust Monocular Depth Estimation: Mixing Datasets for Zero-shot Cross-dataset Transfer"
short: "MiDaS (2020)"
authors: "René Ranftl, Katrin Lasinger, David Hafner, Konrad Schindler, Vladlen Koltun"
venue: "TPAMI 2020"
year: 2020
branch: single-image-3d
lane: depth
links:
  arxiv: "https://arxiv.org/abs/1907.01341"
  code: "https://github.com/isl-org/MiDaS"
problem: >
  Eigen's six-year-old debt: a depth model trained on one dataset dies the
  moment it leaves that dataset. How do you make it work on ANY image?
solution: >
  Mix datasets of fundamentally different nature (3D movies, web stereo photos,
  LiDAR...) with a scale- and shift-invariant loss — accept predicting only
  relative depth in exchange for genuine zero-shot generalization.
limitations: >
  The price of the mix: absolute scale is gone (no "how many meters"). Relative
  depth is enough for photo effects but not for robotics — a metric debt left
  hanging until the 2023+ generation.
relations:
  - node: eigen2014
    type: fixes
    note: >
      Repairs exactly the in-domain ceiling Eigen left behind — with
      multi-source data rather than a new architecture.
    i18n:
