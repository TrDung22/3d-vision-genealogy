          lại là topology bị khóa cứng.
      ja:
        note: "メッシュを直接生成することで、点群に欠けていた「表面」を直しました — その代償はトポロジーの固定です。"
status: seed
i18n:
  vi:
    problem: >
      Tạo ra một bề mặt dùng được (mesh có topology) thay vì một đám điểm rời
      rạc.
    solution: >
      Một graph CNN biến dạng dần một template hình ellipsoid theo đặc trưng
      ảnh, từ thô đến mịn — đầu ra là mesh tam giác có thể render hay in 3D
      ngay lập tức.
    limitations: >
      Topology bị khóa theo template: mọi vật thể đều là một quả cầu bị nắn
      (genus-0), nên cái cốc có quai là bất khả. Đã trót chọn cấu trúc dữ liệu
      nào thì phải trả giá cho nó — voxel trả bằng độ phân giải, mesh trả bằng
      topology.
  ja:
    problem: "バラバラの点の集まりではなく、使える表面 — トポロジーを持つメッシュ — を出力すること。"
    solution: "グラフ CNN が楕円体のテンプレートを画像特徴に導かれて粗から密へと徐々に変形します。出力はそのままレンダリングも3Dプリントもできる三角形メッシュです。"
    limitations: "トポロジーはテンプレートに固定されます。どの物体も「変形された球」(genus-0) なので、取っ手つきのマグカップは原理的に不可能。先にデータ構造を決めれば必ず代償を払う — ボクセルは解像度で、メッシュはトポロジーで。"
