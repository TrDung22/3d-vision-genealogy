title: "DeepSDF: Learning Continuous Signed Distance Functions for Shape Representation"
short: "DeepSDF (2019)"
authors: "Jeong Joon Park, Peter Florence, Julian Straub, Richard Newcombe, Steven Lovegrove"
venue: "CVPR 2019 (Oral)"
year: 2019
branch: single-image-3d
lane: object
links:
  arxiv: "https://arxiv.org/abs/1901.05103"
problem: >
  The same problem as Occupancy Networks: a continuous shape representation locked to
  neither resolution nor topology.
solution: >
  Learn a continuous signed distance function (SDF) with an MLP + an
  auto-decoder that optimizes a latent code per shape; an SDF also gives you
  surface normals and distance-to-surface for free.
limitations: >
  Inference requires optimizing the latent code (slow, initialization-
  sensitive); just as boxed into ShapeNet as the rest of the object-
  reconstruction line.
relations:
  - node: occnet2019
    type: independent
    note: >
      Simultaneous and independent, same CVPR 2019, touching the same idea:
      continuous implicit representations as MLPs (IM-Net was the third sibling
      that year). When an idea is ripe, it falls everywhere at once.
    i18n:
      vi:
        note: >
          Đồng thời và độc lập, cùng một kỳ CVPR 2019, chạm đến cùng một ý
          tưởng: biểu diễn ẩn liên tục dưới dạng MLP (IM-Net là người anh em
          thứ ba năm đó). Ý tưởng khi đã chín thì tự rụng ở nhiều nơi cùng lúc.
      ja:
        note: "同じ CVPR 2019 で、同時にしかも独立に、同じアイデア — MLP による連続的な陰関数表現 — へたどり着きました (その年の三人目の兄弟が IM-Net)。熟したアイデアは、あちこちで同時に実を落とすのです。"
status: seed
i18n:
  vi:
    problem: >
      Cùng bài toán với Occupancy Networks: một cách biểu diễn hình khối liên
      tục, không khóa vào độ phân giải lẫn topology.
    solution: >
      Học hàm khoảng cách có dấu (SDF) liên tục bằng MLP + auto-decoder tối ưu
      một mã latent cho từng hình khối; SDF còn tặng kèm pháp tuyến bề mặt và
      khoảng-cách-đến-bề-mặt miễn phí.
    limitations: >
      Suy luận phải tối ưu mã latent (chậm, nhạy với khởi tạo); và cũng bị
      nhốt trong ShapeNet y như cả mạch dựng lại vật thể.
  ja:
    problem: "Occupancy Networks と同じ問題 — 解像度にもトポロジーにも縛られない、連続的な形状表現を。"
    solution: "MLP で連続的な符号付き距離関数 (SDF) を学習し、auto-decoder が形状ごとに潜在コードを最適化します。SDF なら表面の法線も表面までの距離もおまけで手に入ります。"
    limitations: "推論のたびに潜在コードの最適化が要ります (遅く、初期値に敏感)。そして物体再構成の路線の例に漏れず、ShapeNet の箱の中に閉じ込められたままです。"
