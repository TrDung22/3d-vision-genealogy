title: "SAM 3D: 3Dfy Anything in Images"
short: "SAM 3D (2025)"
authors: "Meta Superintelligence Labs (SAM 3D team)"
venue: "arXiv 2025 → CVPR 2026 (Best Paper Honorable Mention)"
year: 2025
branch: single-image-3d
lane: generative
links:
  arxiv: "https://arxiv.org/abs/2511.16624"
  code: "https://github.com/facebookresearch/sam-3d-objects"
  project: "https://ai.meta.com/research/publications/sam-3d-3dfy-anything-in-images/"
problem: >
  The entire generative wave lived in a curated-object bubble: clean
  backgrounds, full visibility, Objaverse-style assets. Real photographs have
  clutter, occlusion, and spatial LAYOUT — and no model handled them.
solution: >
  A pair of generative models — SAM 3D Objects and SAM 3D Body — predicting
  geometry, texture, AND scene layout from one real-world image, robust to
  occlusion. The key move is on data, not architecture: a human- and
  model-in-the-loop annotation engine that breaks the 3D "data barrier",
  aligning synthetic pretraining with real-image annotation at scale. Wins
  human preference tests at ≥5:1 against prior single-image methods; released
  openly alongside SAM 3 (Nov 2025).
limitations: >
  Object-level quality still trails the best asset generators on studio-style
  inputs; layout is per-object placement, not full scene understanding; and
  the data engine's cost is repeatable only at big-lab scale.
relations:
  - node: trellis2024
    type: fixes
    note: >
      Repairs the wave's curated-world assumption: from Objaverse-style clean
      objects to occluded, cluttered real photographs — with layout — by
