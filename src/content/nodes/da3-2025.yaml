status: seed
i18n:
  vi:
    problem: >
      Hai lane đã âm thầm nhập thành một bài toán: các mô hình độ sâu đơn ảnh
      và transformer hình học đa góc nhìn (VGGT) đang giải cùng một nhiệm vụ
      "khôi phục không gian thị giác" bằng những kiến trúc không tương thích
      và đầu ra chuyên biệt theo task.
    solution: >
      Tối giản triệt để: một transformer trơn (encoder DINO vanilla, không
      chuyên biệt hóa kiến trúc) và một mục tiêu dự đoán duy nhất (depth-ray),
      cân từ 1 đến N góc nhìn, có pose hay không đều được. Huấn luyện
      teacher-student giữ độ chi tiết ngang DA2; benchmark hình học thị giác
      mới cho thấy nó vượt VGGT 44.3% về pose camera và 25.1% về độ chính xác
      hình học.
    limitations: >
      Sự hợp nhất mới là thực nghiệm, chưa phải khái niệm — vì sao một mục
      tiêu depth-ray duy nhất là đủ vẫn chưa được mổ xẻ; và tỉ lệ metric đơn
      ảnh vẫn đến từ dòng dõi teacher chứ chưa được giải lại từ đầu.
  ja:
    problem: "二つのレーンは、いつの間にか同じ問題になっていました。単一画像の深度モデルと多視点幾何トランスフォーマー (VGGT) が、互換性のないアーキテクチャとタスク別ヘッドで、同じ「視覚空間の復元」を解いていたのです。"
    solution: "徹底したミニマリズムです。素のトランスフォーマー一つ (vanilla な DINO エンコーダ、アーキテクチャの特殊化なし) と予測ターゲット一つ (depth-ray) で、ポーズの有無を問わず 1〜N 視点を扱います。teacher-student 学習で DA2 級のディテールを保ち、新しい視覚幾何ベンチマークでは VGGT をカメラ姿勢で 44.3%、幾何精度で 25.1% 上回りました。"
    limitations: "この統一は経験的なもので、概念的な説明はまだありません — なぜ depth-ray という単一ターゲットで足りるのかは十分に分析されておらず、単眼の metric スケールも teacher の血統頼みで、新たに解かれたわけではないのです。"
