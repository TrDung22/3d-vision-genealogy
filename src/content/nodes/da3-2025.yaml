title: "Depth Anything 3: Recovering the Visual Space from Any Views"
short: "Depth Anything 3 (2025)"
authors: "ByteDance Seed (Haotong Lin, Sili Chen, et al.)"
venue: "ICLR 2026"
year: 2025
branch: single-image-3d
lane: depth
links:
  arxiv: "https://arxiv.org/abs/2511.10647"
  code: "https://github.com/ByteDance-Seed/depth-anything-3"
problem: >
  Two lanes had quietly become one problem: single-image depth models and
  multi-view geometry transformers (VGGT) were solving the same "recover visual
  space" task with incompatible architectures and task-specific heads.
solution: >
  Radical minimalism: one plain transformer (a vanilla DINO encoder, no
  architectural specialization) and one prediction target (depth-ray),
  handling 1 to N views with or without poses. Teacher-student training keeps
  DA2-level detail; a new visual-geometry benchmark shows it beating VGGT by
  44.3% on camera pose and 25.1% on geometric accuracy.
limitations: >
  The unification is empirical, not conceptual — why a single depth-ray target
  suffices remains under-analyzed; and monocular metric scale still comes from
  the teacher lineage rather than being solved anew.
