title: "LVSM: A Large View Synthesis Model with Minimal 3D Inductive Bias"
short: "LVSM (2024)"
authors: "Haian Jin, Hanwen Jiang, Hao Tan, Kai Zhang, Sai Bi, Tianyuan Zhang, Fujun Luan, Noah Snavely, Zexiang Xu (Cornell, Adobe, MIT, UT Austin)"
venue: "ICLR 2025 (Oral)"
year: 2024
branch: neural-rendering
lane: feedforward
links:
  arxiv: "https://arxiv.org/abs/2410.17242"
  project: "https://haian-jin.github.io/projects/LVSM/"
problem: >
  Every view synthesis method since 1996 smuggles in 3D machinery — ray
  marching, splatting, epipolar attention, cost volumes. Is any of it
  necessary, or is it all just inductive bias that data can replace?
solution: >
  A transformer that eats posed input-image tokens and EMITS novel-view
  pixels. The decoder-only variant keeps no 3D representation whatsoever —
  no NeRF, no Gaussians, no epipolar structure — and beats the 3D-biased
  state of the art by 1.5-3.5 dB, with quality scaling smoothly with
  compute.
limitations: >
  No explicit 3D means nothing to edit, no guaranteed consistency across
  views, and data-hunger in place of geometry — the classic bitter-lesson
  trade, whose long-term verdict is still out.
relations:
  - node: mvsplat2024
    type: challenges
    note: >
      Challenges the premise of its own subfield: pixelSplat and MVSplat
      compete on BETTER 3D machinery, and LVSM outperforms both with none —
      arguing the geometry priors everyone was refining are training wheels
      that scale eventually removes.
    i18n:
      vi:
        note: >
          Xét lại chính tiền đề của phân ngành mình: pixelSplat và MVSplat
          đua nhau ở việc máy-móc-3D TỐT HƠN, còn LVSM vượt cả hai mà chẳng
          cần chút nào — lập luận rằng các prior hình học ai cũng đang mài
          giũa chỉ là bánh phụ mà quy mô rốt cuộc sẽ tháo bỏ.
      ja:
        note: "自らのサブ分野の前提を問い直します。pixelSplat と MVSplat が「より良い3Dの仕掛け」で競うなか、LVSM は仕掛けゼロで両者を上回る — 皆が磨いていた幾何 prior は、スケールがいずれ外す補助輪だ、と論じるのです。"
  - node: gqn2018
    type: revives
    note: >
      GQN's 2018 creed — rendering as pure learning, no human 3D machinery —
      abandoned when SRN and NeRF proved structure wins, returns at
      transformer scale and finally outperforms the structured lineage that
      displaced it.
    i18n:
      vi:
        note: >
          Tín điều 2018 của GQN — render là học thuần túy, không máy móc 3D
          của con người — bị bỏ khi SRN và NeRF chứng minh cấu trúc thắng,
          quay lại ở quy mô transformer và rốt cuộc vượt mặt chính dòng dõi có
          cấu trúc đã hất cẳng nó.
      ja:
        note: "GQN の2018年の信条 — レンダリングは純粋な学習であり、人間の3Dの仕掛けは要らない — は、SRN と NeRF が構造の勝利を証明したときに捨てられました。それがトランスフォーマー規模で戻り、ついに自分を追いやった構造ありの血統を上回るのです。"
status: seed
i18n:
  vi:
    problem: >
      Mọi phương pháp view synthesis từ 1996 đều lén tuồn vào máy móc 3D —
      ray marching, splatting, epipolar attention, cost volume. Có cái nào
      thật sự cần thiết không, hay tất cả chỉ là inductive bias mà dữ liệu có
      thể thay thế?
    solution: >
      Một transformer nuốt các token ảnh đầu vào có pose và NHẢ RA pixel của
      góc nhìn mới. Biến thể decoder-only không giữ chút biểu diễn 3D nào —
      không NeRF, không Gaussian, không cấu trúc epipolar — mà thắng
      state-of-the-art có thiên kiến 3D 1.5–3.5 dB, chất lượng scale mượt
      theo compute.
    limitations: >
      Không 3D tường minh nghĩa là không có gì để sửa, không đảm bảo nhất quán
      xuyên góc nhìn, và đói dữ liệu thay cho hình học — cuộc đánh đổi
      bitter-lesson kinh điển, mà phán quyết dài hạn vẫn chưa ngã ngũ.
  ja:
    problem: "1996年以降のあらゆる視点合成手法は、3Dの仕掛け — レイマーチング、スプラッティング、epipolar アテンション、cost volume — を密輸してきました。そのどれかが本当に必要なのか、それともすべてデータが置き換えられる帰納バイアスにすぎないのか?"
    solution: "ポーズ付き入力画像のトークンを飲み込み、新規視点のピクセルを吐き出すトランスフォーマーです。デコーダのみの変種は3D表現を一切持たず — NeRF もガウシアンも epipolar 構造もなし — 3D バイアスを持つ最高水準を 1.5〜3.5 dB 上回り、品質は計算量とともに滑らかにスケールします。"
    limitations: "明示的な3Dがないということは、編集するものが何もなく、視点間の一貫性の保証もなく、幾何の代わりにデータを渇望するということ — 古典的な bitter lesson の取引であり、その長期的な判決はまだ出ていません。"
