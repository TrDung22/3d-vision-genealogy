title: "Fourier Features Let Networks Learn High Frequency Functions in Low Dimensional Domains"
short: "Fourier Features (2020)"
authors: "Matthew Tancik, Pratul P. Srinivasan, Ben Mildenhall, Sara Fridovich-Keil, Nithin Raghavan, Utkarsh Singhal, Ravi Ramamoorthi, Jonathan T. Barron, Ren Ng"
venue: "NeurIPS 2020 (Spotlight)"
year: 2020
branch: neural-rendering
lane: scene-reps
links:
  arxiv: "https://arxiv.org/abs/2006.10739"
  project: "https://bmild.github.io/fourfeat/"
problem: >
  NeRF only works because of a mysterious hack — the "positional encoding"
  that maps coordinates through sinusoids before the MLP. Why does it work,
  and what happens without it?
solution: >
  A neural-tangent-kernel analysis: plain MLPs converge impractically slowly
  on high frequencies (spectral bias); a random Fourier feature mapping turns
  the NTK into a tunable stationary kernel, unlocking sharp detail. The hack
  becomes a theory — with a knob for the frequency bandwidth.
limitations: >
  Bandwidth is global and hand-tuned: too low is blurry, too high is noisy.
  Aliasing across scales is untreated (mip-NeRF's opening), and the encoding
  is dense — hash grids later made it sparse and fast.
relations:
  - node: nerf2020
    type: builds-on
    note: >
      From the NeRF team itself: extracts the one component NeRF couldn't
      explain — positional encoding — and gives it a theory, turning an
      empirical trick into reusable infrastructure for every coordinate
      network since.
    i18n:
      vi:
        note: >
          Từ chính đội NeRF: rút ra đúng thành phần NeRF không giải thích nổi
          — positional encoding — và trao cho nó một lý thuyết, biến một mẹo
          thực nghiệm thành hạ tầng tái dùng được cho mọi mạng tọa độ từ đó
          về sau.
      ja:
        note: "NeRF チーム自身の手による — NeRF が説明できなかった唯一の部品 (positional encoding) を取り出し、理論を与えました。経験則のトリックが、以後あらゆる座標ネットワークの再利用可能なインフラになったのです。"
  - node: siren2020
    type: independent
    note: >
      Submitted the same week in June 2020, one campus apart: Stanford fixed
      spectral bias inside the network (sine activations); Berkeley fixed it
      at the input (Fourier mapping). Two doors into the same room.
    i18n:
      vi:
        note: >
          Nộp cùng một tuần tháng 6/2020, cách nhau một campus: Stanford sửa
          thiên kiến phổ bên trong mạng (kích hoạt sine); Berkeley sửa nó ở
          đầu vào (ánh xạ Fourier). Hai cánh cửa vào cùng một căn phòng.
      ja:
        note: "2020年6月の同じ週に、キャンパス一つ隔てて投稿されました。Stanford はスペクトルバイアスをネットワークの内側で (正弦活性化)、Berkeley は入力側で (Fourier マッピング) 直した。同じ部屋への二つの扉です。"
status: seed
i18n:
  vi:
    problem: >
      NeRF chạy được chỉ nhờ một mẹo bí ẩn — "positional encoding" ánh xạ tọa
      độ qua các hàm sin trước khi vào MLP. Vì sao nó chạy, và không có nó thì
      sao?
    solution: >
      Một phân tích neural-tangent-kernel: MLP trơn hội tụ chậm đến vô dụng ở
      tần số cao (thiên kiến phổ); một ánh xạ đặc trưng Fourier ngẫu nhiên
      biến NTK thành một kernel dừng chỉnh được, mở khóa chi tiết sắc. Mẹo trở
      thành lý thuyết — với một cái núm cho băng thông tần số.
    limitations: >
      Băng thông là toàn cục và chỉnh tay: thấp quá thì nhòe, cao quá thì
      nhiễu. Răng cưa xuyên tỉ lệ chưa được xử lý (đúng khe hở cho mip-NeRF),
      và mã hóa dày đặc — hash grid sau này làm nó thưa và nhanh.
  ja:
    problem: "NeRF が動くのは、謎めいたハック一つのおかげです — MLP に入れる前に座標を正弦関数へ写す「positional encoding」。なぜそれが効くのか、そして無ければどうなるのか?"
    solution: "neural-tangent-kernel の解析です。素の MLP は高周波では実用にならないほど遅く収束します (スペクトルバイアス)。ランダム Fourier 特徴のマッピングが NTK を調整可能な定常カーネルに変え、鋭いディテールを解き放ちました。ハックが理論になった — 周波数帯域のつまみ付きで。"
    limitations: "帯域はグローバルかつ手動調整です。低すぎればぼやけ、高すぎればノイズが乗る。スケールをまたぐエイリアシングは未処理のまま (mip-NeRF の入口)、符号化も密でした — ハッシュグリッドがのちにそれを疎で高速にします。"
